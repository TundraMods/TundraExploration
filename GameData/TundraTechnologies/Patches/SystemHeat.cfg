@PART[TT_G1_BASE]
{
	refPower = 299
	refECReq = 0.15
	refTemp = 350
	refVolume = 3732
	refArea = 14.93
	
	@MODULE[ModuleB9PartSwitch]:HAS[#moduleID[TT_G1_BASE]]
	{
		@SUBTYPE,0
		{
			descriptionSummary = #<b>System Heat</b>:<br> - Dissipates $/refPower$ kW at $/refTemp$ K
		}
		@SUBTYPE,1
		{
			descriptionSummary = #<b>System Heat</b>:<br> - Dissipates $/refPower$ kW at $/refTemp$ K
		}
		@SUBTYPE,2
		{
			descriptionSummary = <b>System Heat</b>:<br> - Disabled
			MODULE
			{
				IDENTIFIER
				{
					name = ModuleActiveRadiator
				}
				DATA
				{
					maxEnergyTransfer = 0
					RESOURCE
					{
						name = ElectricCharge
						rate = 0
					}
				}
			}
		}
		@SUBTYPE,3
		{
			descriptionSummary = <b>System Heat</b>:<br> - Disabled
			MODULE
			{
				IDENTIFIER
				{
					name = ModuleActiveRadiator
				}
				DATA
				{
					maxEnergyTransfer = 0
					RESOURCE
					{
						name = ElectricCharge
						rate = 0
					}
				}
			}
		}
	}
}

@PART[TT_G1_BASE]:NEEDS[SystemHeat]
{
	MODULE
	{
		name = ModuleSystemHeat
		volume = #$/refVolume$
		@volume *= 0.04
		moduleID = default
		iconName = Icon_Radiator
		ignoreTemperature = false
	}
	@MODULE[ModuleActiveRadiator]
	{
		@name = ModuleSystemHeatRadiator
		moduleID = radiator
		// ModuleSystemHeat instance to link to
		systemHeatModuleID = default
		scalarModuleID = heat
		maxTempAnimation = #$/maxTemp$

		// option: use deterministic temperatures
		// Power radiated per temperature
		temperatureCurve
		{
			key = 0 0
			key = 0.2 0.0016
			key = 0.4 0.0256
			key = 0.6 0.1296
			key = 0.8 0.4096
			key = 1 1
			@key,*[0, ] *= #$/refTemp$
			@key,*[1, ] *= #$/refPower$
		}
		// area for convection
		convectiveArea = #$/refArea$
	}
	@MODULE[ModuleB9PartSwitch]:HAS[#moduleID[TT_G1_BASE]]
	{
		@SUBTYPE,2
		{
			@MODULE
			{
				@IDENTIFIER
				{
					@name = ModuleSystemHeatRadiator
				}
			}
		}
		@SUBTYPE,3
		{
			@MODULE
			{
				@IDENTIFIER
				{
					@name = ModuleSystemHeatRadiator
				}
			}
		}
	}
}