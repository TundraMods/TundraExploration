@PART[TE_*_Tank]:NEEDS[B9PartSwitch,!ConfigurableContainers/Parts,!ModularFuelTanks,!RealFuels]
{
	MODULE:NEEDS[CryoTanks]
	{
		name =  ModuleCryoTank
		CoolingEnabled = False
		BOILOFFCONFIG
		{
			FuelName = LqdHydrogen
			// in % per hr
			BoiloffRate = 0.05
			CoolingCost = 0.05
		}
		BOILOFFCONFIG
		{
			FuelName = LqdMethane
			// in % per hr
			BoiloffRate = 0.005
			CoolingCost = 0.02
		}
	}
	MODULE
	{
		name = ModuleB9PartSwitch
		switchInFlight = True
		moduleID = TE_Fuel
		switcherDescription = Kaijuu Tank
		switcherDescriptionPlural = Kaijuu Tanks
		baseVolume = 1
		SUBTYPE
		{
			name = LFO
			tankType = LFO
			title = LFO
		}
		SUBTYPE
		{
			name = LiquidFuel
			tankType = LiquidFuel
			title = LiquidFuel
		}
		SUBTYPE:NEEDS[CryoTanks|RationalResources]
		{
			name = Oxidizer
			tankType = OX
			title = Oxidizer
		}
	}
}

@PART[TE_*_Tank]:NEEDS[CommunityResourcePack]
{
	@MODULE[ModuleB9PartSwitch]:HAS[#moduleID[TE_Fuel]]:NEEDS[CryoTanks|RationalResources]
	{
		SUBTYPE
		{
			name = LH2O
			tankType = LH2O
			title = #LOC_CryoTanks_switcher_fuel_lh2ox
			@tankType:NEEDS[RationalResources,!CryoTanks] = RR_CryoHLOX
			@title:NEEDS[RationalResources,!CryoTanks] = Hydrolox
		}
		SUBTYPE
		{
			name = LH2
			tankType = LH2
			title = #LOC_CryoTanks_switcher_fuel_lh2
			@tankType:NEEDS[RationalResources,!CryoTanks] = RR_CryoH
			@title:NEEDS[RationalResources,!CryoTanks] = LqdHydrogen
		}
		SUBTYPE
		{
			name = LCH4O
			tankType = LMOx
			title = #LOC_CryoTanks_switcher_fuel_methalox
			@tankType:NEEDS[RationalResources,!CryoTanks] = RR_CryoMLOX
			@title:NEEDS[RationalResources,!CryoTanks] = Methalox
		}
		SUBTYPE
		{
			name = LCH4
			tankType = LM
			title = #LOC_CryoTanks_switcher_fuel_methane
			@tankType:NEEDS[RationalResources,!CryoTanks] = RR_CryoM
			@title:NEEDS[RationalResources,!CryoTanks] = LqdMethane
		}
	}
}

