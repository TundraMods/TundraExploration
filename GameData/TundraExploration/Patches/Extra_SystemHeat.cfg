@PART[TE_18_DRAGONV2_TRUNK]:NEEDS[SystemHeat]
{
	refPower = 196
	refTemp = 350
	refArea = 9.82
	refVolume = 2454
	MODULE
	{
		name = ModuleSystemHeat
		volume = #$/refVolume$
		@volume *= 0.04
		moduleID = default
		iconName = Icon_Radiator
		ignoreTemperature = false
	}
	@MODULE[ModuleActiveRadiator]
	{
		@name = ModuleSystemHeatRadiator
		moduleID = radiator
		// ModuleSystemHeat instance to link to
		systemHeatModuleID = default
		scalarModuleID = heat
		maxTempAnimation = #$/maxTemp$

		// option: use deterministic temperatures
		// Power radiated per temperature
		temperatureCurve
		{
			key = 0 0
			key = 0.2 0.0016
			key = 0.4 0.0256
			key = 0.6 0.1296
			key = 0.8 0.4096
			key = 1 1
			@key,*[0, ] *= #$/refTemp$
			@key,*[1, ] *= #$/refPower$
		}
		// area for convection
		convectiveArea = #$/refArea$
	}
}